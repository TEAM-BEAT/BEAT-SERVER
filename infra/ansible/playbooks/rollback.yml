---
- name: "Rollback {{ module }}"
  hosts: "{{ module }}_servers"
  become: true
  gather_facts: false

  vars:
    module_cfg: "{{ modules[module] }}"
    release_dir: "{{ release_root }}/{{ module }}"
    network_health_max_attempts: 30
    network_health_sleep_seconds: 2
    service_smoke_max_attempts: 15
    service_smoke_sleep_seconds: 2

  pre_tasks:
    - name: Validate module parameter
      ansible.builtin.assert:
        that:
          - module is defined
          - modules is defined
          - module in modules
          - actuator_port is defined
          - actuator_path is defined
        fail_msg: "Required extra vars: module"
      tags:
        - always
        - validate

  roles:
    - role: app_rollback
      tags:
        - rollback
        - release

  tasks:
    - name: Verify rollback result and restore metadata truth
      block:
        - name: Healthcheck module after rollback before metadata promotion
          ansible.builtin.import_role:
            name: app_healthcheck
          tags:
            - rollback
            - healthcheck

        - name: Configure nginx routing after rollback
          ansible.builtin.import_role:
            name: app_stopstart
            tasks_from: admin_nginx_route.yml
          when: module_cfg.nginx_route is defined
          tags:
            - rollback
            - nginx
            - routing

        - name: Promote previous metadata back to current after rollback completion to restore live metadata truth
          # Keep current.json aligned with the release that is live again after
          # rollback so the next deploy snapshots the correct previous release.
          ansible.builtin.copy:
            src: "{{ release_dir }}/previous.json"
            dest: "{{ release_dir }}/current.json"
            remote_src: true
            mode: "0644"
          tags:
            - rollback
            - release
      rescue:
        - name: Abort rollback metadata promotion when post-rollback invariant fails
          ansible.builtin.fail:
            msg: >-
              Rollback runtime change completed but post-rollback healthcheck or nginx route update failed
              for module '{{ module }}'. Metadata promotion was intentionally skipped so
              {{ release_dir }}/current.json is not advanced to an unverified runtime state.
