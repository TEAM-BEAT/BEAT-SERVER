---
- name: Converge foundation stack
  hosts: all
  become: true
  gather_facts: false

  vars:
    foundation_marker_path: "{{ deployment_dir }}/.foundation-applied"

  roles:
    - role: foundation_stack
      tags:
        - foundation
        - compose
    - role: nginx_base_config
      when: foundation_manage_nginx | default(false) | bool
      tags:
        - foundation
        - nginx

  post_tasks:
    - name: Mark foundation as applied
      ansible.builtin.copy:
        dest: "{{ foundation_marker_path }}"
        mode: "0644"
        content: |
          applied_at: {{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}
          commit_sha: {{ commit_sha | default('unknown') }}
          deploy_environment: {{ deploy_environment }}
          foundation_mysql_enabled: {{ foundation_mysql_enabled | default(true) }}
          foundation_redis_enabled: {{ foundation_redis_enabled | default(true) }}
          foundation_manage_nginx: {{ foundation_manage_nginx | default(false) }}
      tags:
        - foundation
        - marker
