---
- name: Ensure nginx config helper is installed
  ansible.builtin.import_role:
    name: nginx_config_helper

- name: Resolve admin nginx fragment paths
  ansible.builtin.set_fact:
    app_stopstart_admin_upstream_source_path: "{{ nginx_generated_source_dir }}/upstreams/admin_backend.conf"
    app_stopstart_admin_upstream_target_path: "{{ nginx_generated_target_dir }}/upstreams/admin_backend.conf"
    app_stopstart_admin_route_source_path: "{{ nginx_generated_source_dir }}/routes/10-managed.conf"
    app_stopstart_admin_route_target_path: "{{ nginx_generated_target_dir }}/routes/10-managed.conf"
    app_stopstart_backend_upstream_source_path: "{{ nginx_generated_source_dir }}/upstreams/backend.conf"
    app_stopstart_backend_upstream_target_path: "{{ nginx_generated_target_dir }}/upstreams/backend.conf"
    app_stopstart_actuator_upstream_source_path: "{{ nginx_generated_source_dir }}/upstreams/actuator.conf"
    app_stopstart_actuator_upstream_target_path: "{{ nginx_generated_target_dir }}/upstreams/actuator.conf"
    app_stopstart_legacy_upstream_source_path: "{{ nginx_generated_source_dir }}/upstreams/00-managed.conf"
    app_stopstart_legacy_upstream_target_path: "{{ nginx_generated_target_dir }}/upstreams/00-managed.conf"

- name: Build admin nginx route transaction plan
  ansible.builtin.set_fact:
    app_stopstart_admin_nginx_transaction_files:
      - id: live-config-source
        path: "{{ nginx_conf_source_path }}"
        role: source-config
        backup: true
        required: false
      - id: live-config-target
        path: "{{ nginx_conf_target_path }}"
        role: live-config
        backup: true
        required: false
      - id: backend-upstream-source
        path: "{{ app_stopstart_backend_upstream_source_path }}"
        role: source
        backup: true
        required: false
      - id: backend-upstream-target
        path: "{{ app_stopstart_backend_upstream_target_path }}"
        role: target
        backup: true
        required: false
      - id: admin-upstream-source
        path: "{{ app_stopstart_admin_upstream_source_path }}"
        role: source
        backup: true
        required: false
      - id: admin-upstream-target
        path: "{{ app_stopstart_admin_upstream_target_path }}"
        role: target
        backup: true
        required: false
      - id: actuator-upstream-source
        path: "{{ app_stopstart_actuator_upstream_source_path }}"
        role: source
        backup: true
        required: false
      - id: actuator-upstream-target
        path: "{{ app_stopstart_actuator_upstream_target_path }}"
        role: target
        backup: true
        required: false
      - id: legacy-upstream-source
        path: "{{ app_stopstart_legacy_upstream_source_path }}"
        role: legacy
        backup: true
        required: false
      - id: legacy-upstream-target
        path: "{{ app_stopstart_legacy_upstream_target_path }}"
        role: legacy
        backup: true
        required: false
      - id: admin-route-source
        path: "{{ app_stopstart_admin_route_source_path }}"
        role: source
        backup: true
        required: false
      - id: admin-route-target
        path: "{{ app_stopstart_admin_route_target_path }}"
        role: target
        backup: true
        required: false
    app_stopstart_admin_nginx_transaction_operations:
      - id: split-legacy-upstream-source
        name: Split legacy upstream source into owned fragments
        kind: command
        when_file_exists: legacy-upstream-source
        command:
          argv:
            - python3
            - "{{ deployment_dir }}/update-nginx-config.py"
            - split-upstreams
            - --source
            - "{{ app_stopstart_legacy_upstream_source_path }}"
            - --output-dir
            - "{{ nginx_generated_source_dir }}/upstreams"
            - --mapping
            - "{{ backend_upstream_name | default('backend') }}=backend.conf"
            - --mapping
            - "{{ admin_upstream_name | default('admin_backend') }}=admin_backend.conf"
            - --mapping
            - "{{ actuator_upstream_name | default('actuator') }}=actuator.conf"
            - --require-all
            - --skip-existing
        changed_if:
          stdout_json:
            changed: true
        affects_reload: false
      - id: remove-legacy-upstream-source
        name: Remove legacy upstream source after split migration
        kind: file_absent
        file: legacy-upstream-source
        when_file_preexisted: legacy-upstream-source
        affects_reload: false
      - id: verify-legacy-target-fragments
        name: Verify split upstream fragments before removing legacy target
        kind: command
        when_file_preexisted: legacy-upstream-target
        command:
          argv:
            - python3
            - -c
            - |
              import pathlib
              import sys

              missing = [path for path in sys.argv[1:] if not pathlib.Path(path).exists()]
              if missing:
                  raise SystemExit(
                      "Cannot remove legacy upstreams/00-managed.conf until "
                      "backend/admin/actuator fragments exist: " + ", ".join(missing)
                  )
              print('{"changed": false}')
            - "{{ app_stopstart_backend_upstream_source_path }}"
            - "{{ app_stopstart_admin_upstream_source_path }}"
            - "{{ app_stopstart_actuator_upstream_source_path }}"
        changed_if:
          stdout_json:
            changed: true
        affects_reload: false
      - id: sync-legacy-backend-upstream-target
        name: Sync split backend upstream before removing legacy target
        kind: copy
        src_file: backend-upstream-source
        dest_file: backend-upstream-target
        mode: "0644"
        when_file_preexisted: legacy-upstream-target
        affects_reload: true
      - id: sync-legacy-admin-upstream-target
        name: Sync split admin upstream before removing legacy target
        kind: copy
        src_file: admin-upstream-source
        dest_file: admin-upstream-target
        mode: "0644"
        when_file_preexisted: legacy-upstream-target
        affects_reload: true
      - id: sync-legacy-actuator-upstream-target
        name: Sync split actuator upstream before removing legacy target
        kind: copy
        src_file: actuator-upstream-source
        dest_file: actuator-upstream-target
        mode: "0644"
        when_file_preexisted: legacy-upstream-target
        affects_reload: true
      - id: remove-legacy-upstream-target-before-validation
        name: Remove legacy upstream target before nginx validation
        kind: file_absent
        file: legacy-upstream-target
        when_file_preexisted: legacy-upstream-target
        affects_reload: true
      - id: bootstrap-nginx-include-markers
        name: Ensure nginx generated include markers exist
        kind: command
        command:
          argv:
            - python3
            - "{{ deployment_dir }}/update-nginx-config.py"
            - bootstrap-includes
            - --path
            - "{{ nginx_conf_source_path }}"
            - --upstream-include-glob
            - "{{ nginx_generated_include_dir }}/upstreams/*.conf"
            - --route-include-glob
            - "{{ nginx_generated_include_dir }}/routes/*.conf"
        changed_if:
          stdout_json:
            changed: true
        affects_reload: false
      - id: update-admin-upstream-source
        name: Ensure admin upstream fragment exists
        kind: command
        command:
          argv:
            - python3
            - "{{ deployment_dir }}/update-nginx-config.py"
            - upsert-upstream
            - --path
            - "{{ app_stopstart_admin_upstream_source_path }}"
            - --upstream-name
            - "{{ module_cfg.nginx_route.upstream_name }}"
            - --container-name
            - "{{ module_cfg.container_name }}"
            - --backend-port
            - "{{ module_cfg.app_port | string }}"
        changed_if:
          stdout_json:
            changed: true
        affects_reload: false
      - id: update-admin-route-source
        name: Ensure admin route fragment exists
        kind: command
        command:
          argv:
            - python3
            - "{{ deployment_dir }}/update-nginx-config.py"
            - ensure-route
            - --path
            - "{{ app_stopstart_admin_route_source_path }}"
            - --upstream-name
            - "{{ module_cfg.nginx_route.upstream_name }}"
            - --external-path
            - "{{ module_cfg.nginx_route.external_path }}"
            - --upstream-path
            - "{{ module_cfg.nginx_route.upstream_path }}"
        changed_if:
          stdout_json:
            changed: true
        affects_reload: false
      - id: sync-admin-upstream-target
        name: Sync generated admin upstream fragment to target
        kind: copy
        src_file: admin-upstream-source
        dest_file: admin-upstream-target
        mode: "0644"
        affects_reload: true
      - id: sync-admin-route-target
        name: Sync generated admin route fragment to target
        kind: copy
        src_file: admin-route-source
        dest_file: admin-route-target
        mode: "0644"
        affects_reload: true
      - id: sync-bootstrapped-live-config
        name: Sync bootstrapped nginx source config to target
        kind: copy
        src_file: live-config-source
        dest_file: live-config-target
        mode: "0644"
        affects_reload: true

- name: Sync admin nginx source and target files transactionally
  ansible.builtin.include_role:
    name: nginx_fragment_transaction
  vars:
    nginx_fragment_transaction_id: app-stopstart-admin-route
    nginx_fragment_transaction_files: "{{ app_stopstart_admin_nginx_transaction_files }}"
    nginx_fragment_transaction_operations: "{{ app_stopstart_admin_nginx_transaction_operations }}"
    nginx_fragment_transaction_validate_command:
      - docker
      - exec
      - "{{ nginx_container_name }}"
      - nginx
      - -t
    nginx_fragment_transaction_reload_command:
      - docker
      - exec
      - "{{ nginx_container_name }}"
      - nginx
      - -s
      - reload
    nginx_fragment_transaction_failure_summary: >-
      Admin nginx route update failed for {{ module }} and previous nginx
      source/target state was restored
