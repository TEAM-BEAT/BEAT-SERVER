---
- name: Ensure stop-start container is recreated with the target image
  community.docker.docker_container:
    name: "{{ module_cfg.container_name }}"
    image: "{{ app_stopstart_image | default(image) }}"
    state: started
    recreate: true
    restart_policy: unless-stopped
    networks:
      - name: "{{ docker_network }}"
    volumes:
      - "{{ secret_dir }}:/app/secret:ro"
    env: >-
      {{
        {
          'SPRING_PROFILES_ACTIVE': module_cfg.spring_profile,
          'BEAT_SCHEDULER_OWNER': module_cfg.scheduler_owner | default(false) | string
        }
        | combine({
          (module_cfg.spring_profile | upper ~ '_ACTUATOR_PORT'): actuator_port | string,
          (module_cfg.spring_profile | upper ~ '_ACTUATOR_PATH'): actuator_path
        })
      }}
