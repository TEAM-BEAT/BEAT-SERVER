---
- name: Check whether current metadata already exists
  ansible.builtin.stat:
    path: "{{ release_dir }}/current.json"
  register: app_cleanup_current_release_stat

- name: Preserve previous successful release metadata
  ansible.builtin.copy:
    src: "{{ release_dir }}/current.json"
    dest: "{{ release_dir }}/previous.json"
    remote_src: true
    mode: "0644"
  when: app_cleanup_current_release_stat.stat.exists

- name: Promote pending metadata to current
  ansible.builtin.copy:
    src: "{{ pending_metadata_path }}"
    dest: "{{ release_dir }}/current.json"
    remote_src: true
    mode: "0644"

- name: Remove pending metadata after promotion
  ansible.builtin.file:
    path: "{{ pending_metadata_path }}"
    state: absent

- name: Assert docker image prune failure policy is supported
  ansible.builtin.assert:
    that:
      - docker_image_prune_failure_policy | default('warn') in ['warn', 'fail']
    fail_msg: >-
      docker_image_prune_failure_policy must be either 'warn' or 'fail'
      (got {{ docker_image_prune_failure_policy | default('warn') }}).

- name: Remove dangling Docker images
  ansible.builtin.command:
    argv:
      - docker
      - image
      - prune
      - -f
      - --filter
      - "until={{ docker_image_prune_retention | default('72h') }}"
  register: app_cleanup_docker_prune_result
  changed_when:
    - app_cleanup_docker_prune_result.rc == 0
    - app_cleanup_docker_prune_result.stdout | default('') is not search('Total reclaimed space:\\s*0\\s*B')
  failed_when:
    - app_cleanup_docker_prune_result.rc != 0
    - docker_image_prune_failure_policy | default('warn') == 'fail'

- name: Report docker prune cleanup issue
  ansible.builtin.debug:
    msg: >-
      docker image prune failed during cleanup with policy=warn:
      {{
        app_cleanup_docker_prune_result.stderr
        | default('', true)
        | default(app_cleanup_docker_prune_result.stdout | default('unknown error', true), true)
      }}
  when:
    - app_cleanup_docker_prune_result.rc != 0
    - docker_image_prune_failure_policy | default('warn') == 'warn'
