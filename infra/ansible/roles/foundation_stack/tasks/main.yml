---
- name: Build foundation compose definition from template
  ansible.builtin.set_fact:
    foundation_stack_compose_definition: >-
      {{
        lookup('ansible.builtin.template', 'foundation.compose.yml.j2')
        | from_yaml
      }}
  no_log: true

- name: Ensure deployment directory exists
  ansible.builtin.file:
    path: "{{ deployment_dir }}"
    state: directory
    mode: "0755"

- name: Ensure deployment Docker network exists
  community.docker.docker_network:
    name: "{{ docker_network }}"
    state: present

- name: Ensure nginx config volume exists
  community.docker.docker_volume:
    name: "{{ nginx_config_volume_name | default('nginx-config-volume') }}"
    state: present

- name: Ensure mysql data volume exists
  community.docker.docker_volume:
    name: "{{ mysql_data_volume_name | default('mysql-data') }}"
    state: present
  when: foundation_mysql_enabled | default(true)

- name: Ensure redis data volume exists
  community.docker.docker_volume:
    name: "{{ redis_data_volume_name | default('redis-data') }}"
    state: present
  when: foundation_redis_enabled | default(true)

- name: Render foundation compose file
  ansible.builtin.template:
    src: foundation.compose.yml.j2
    dest: "{{ deployment_dir }}/docker-compose.yml"
    mode: "0640"
    backup: false
  no_log: true

- name: Validate rendered foundation compose
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - "{{ deployment_dir }}/docker-compose.yml"
      - config
  register: foundation_stack_compose_config_result
  changed_when: false
  no_log: true

- name: Ensure foundation stack is present
  community.docker.docker_compose_v2:
    project_name: deployment
    definition: "{{ foundation_stack_compose_definition }}"
    state: present
  register: foundation_stack_compose_result
  no_log: true

- name: Report foundation compose result (redacted)
  ansible.builtin.debug:
    msg:
      changed: "{{ foundation_stack_compose_result.changed | default(false) }}"
      services: >-
        {{
          foundation_stack_compose_definition.services
          | default({})
          | dict2items
          | map(attribute='key')
          | list
          | sort
        }}
      compose_config_valid: "{{ foundation_stack_compose_config_result.rc | default(1) == 0 }}"
