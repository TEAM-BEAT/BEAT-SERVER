---
- name: Wait for module health on docker network
  ansible.builtin.shell: |
    set -euo pipefail
    attempts="{{ network_health_max_attempts }}"
    delay="{{ network_health_sleep_seconds }}"
    target="{{ app_healthcheck_probe_target_container }}"

    for attempt in $(seq 1 "$attempts"); do
      if docker run --rm --network "{{ docker_network }}" {{ curl_image | quote }} \
          -fsS "http://${target}:{{ actuator_port }}{{ actuator_path }}/health" >/dev/null 2>&1; then
        exit 0
      fi
      sleep "$delay"
    done
    exit 1
  args:
    executable: /bin/bash
  changed_when: false
