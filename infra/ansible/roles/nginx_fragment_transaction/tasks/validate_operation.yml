---
- name: Validate nginx transaction template operation
  ansible.builtin.assert:
    that:
      - nginx_fragment_transaction_operation.template is defined
      - nginx_fragment_transaction_operation.template.src is defined
      - nginx_fragment_transaction_operation.template.src | length > 0
      - nginx_fragment_transaction_operation.dest_file is defined
      - nginx_fragment_transaction_operation.dest_file in nginx_fragment_transaction_file_map
    fail_msg: >-
      Invalid nginx transaction template operation:
      {{ nginx_fragment_transaction_operation | to_json }}
  when: nginx_fragment_transaction_operation.kind == 'template'

- name: Validate nginx transaction command operation
  ansible.builtin.assert:
    that:
      - nginx_fragment_transaction_operation.command is defined
      - nginx_fragment_transaction_operation.command.argv is defined
      - nginx_fragment_transaction_operation.command.argv is sequence
      - nginx_fragment_transaction_operation.command.argv is not string
      - nginx_fragment_transaction_operation.command.argv | length > 0
      - nginx_fragment_transaction_operation.changed_if is defined
      - >-
        (
          nginx_fragment_transaction_operation.changed_if.stdout_json is defined
          and nginx_fragment_transaction_operation.changed_if.stdout_json.changed is defined
          and nginx_fragment_transaction_operation.changed_if.stdout_json.changed in [true, false]
        )
        or (
          nginx_fragment_transaction_operation.changed_if.stdout_contains is defined
          and nginx_fragment_transaction_operation.changed_if.stdout_contains | length > 0
        )
    fail_msg: >-
      Invalid nginx transaction command operation:
      {{ nginx_fragment_transaction_operation | to_json }}
  when: nginx_fragment_transaction_operation.kind == 'command'

- name: Validate nginx transaction copy operation
  ansible.builtin.assert:
    that:
      - nginx_fragment_transaction_operation.src_file is defined
      - nginx_fragment_transaction_operation.src_file in nginx_fragment_transaction_file_map
      - nginx_fragment_transaction_operation.dest_file is defined
      - nginx_fragment_transaction_operation.dest_file in nginx_fragment_transaction_file_map
    fail_msg: "Invalid nginx transaction copy operation: {{ nginx_fragment_transaction_operation | to_json }}"
  when: nginx_fragment_transaction_operation.kind == 'copy'

- name: Validate nginx transaction absent-file operation
  ansible.builtin.assert:
    that:
      - nginx_fragment_transaction_operation.file is defined
      - nginx_fragment_transaction_operation.file in nginx_fragment_transaction_file_map
    fail_msg: >-
      Invalid nginx transaction file_absent operation:
      {{ nginx_fragment_transaction_operation | to_json }}
  when: nginx_fragment_transaction_operation.kind == 'file_absent'

- name: Validate nginx transaction conditional file references
  ansible.builtin.assert:
    that:
      - >-
        nginx_fragment_transaction_operation.when_file_exists | default('') == ''
        or nginx_fragment_transaction_operation.when_file_exists in nginx_fragment_transaction_file_map
      - >-
        nginx_fragment_transaction_operation.when_file_missing | default('') == ''
        or nginx_fragment_transaction_operation.when_file_missing in nginx_fragment_transaction_file_map
      - >-
        nginx_fragment_transaction_operation.when_file_preexisted | default('') == ''
        or nginx_fragment_transaction_operation.when_file_preexisted in nginx_fragment_transaction_file_map
    fail_msg: >-
      Invalid nginx transaction conditional reference:
      {{ nginx_fragment_transaction_operation | to_json }}
