---
# Defaults for the nginx fragment transaction role. Callers must provide files
# and operations explicitly; empty defaults keep accidental imports fail-fast.
nginx_fragment_transaction_id: nginx-fragment-transaction
nginx_fragment_transaction_files: []
nginx_fragment_transaction_operations: []
nginx_fragment_transaction_backup_suffix: ".bak"
nginx_fragment_transaction_failure_summary: "nginx fragment transaction failed and previous source/target config was restored"
nginx_fragment_transaction_validate_command:
  - docker
  - exec
  - "{{ nginx_container_name | default('nginx') }}"
  - nginx
  - -t
nginx_fragment_transaction_reload_command:
  - docker
  - exec
  - "{{ nginx_container_name | default('nginx') }}"
  - nginx
  - -s
  - reload
