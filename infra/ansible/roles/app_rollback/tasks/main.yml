---
- name: Check that previous release metadata exists
  ansible.builtin.stat:
    path: "{{ release_dir }}/previous.json"
  register: previous_release_stat

- name: Abort when there is no previous release to roll back to
  ansible.builtin.assert:
    that:
      - previous_release_stat.stat.exists
    fail_msg: "Cannot rollback {{ module }} because {{ release_dir }}/previous.json does not exist."

- name: Read previous release metadata
  ansible.builtin.slurp:
    src: "{{ release_dir }}/previous.json"
  register: previous_release_raw

- name: Parse previous release metadata
  ansible.builtin.set_fact:
    previous_release: "{{ previous_release_raw.content | b64decode | from_json }}"

- name: Check whether current release metadata exists
  ansible.builtin.stat:
    path: "{{ release_dir }}/current.json"
  register: current_release_stat

- name: Archive the current release metadata before rollback
  ansible.builtin.copy:
    src: "{{ release_dir }}/current.json"
    dest: "{{ release_dir }}/reverted-{{ lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ') }}.json"
    remote_src: true
    mode: "0644"
  when: current_release_stat.stat.exists

- name: Set rollback image for blue-green lane
  ansible.builtin.set_fact:
    bluegreen_image: "{{ previous_release.image }}"
  when: module_cfg.deploy_mode == 'blue_green'

- name: Roll back blue-green lane via Ansible tasks
  ansible.builtin.import_tasks: ../../app_bluegreen/tasks/run_switch.yml
  when: module_cfg.deploy_mode == 'blue_green'

- name: Set rollback image for stop-start lanes
  ansible.builtin.set_fact:
    stopstart_image: "{{ previous_release.image }}"
  when: module_cfg.deploy_mode == 'stop_start'

- name: Roll back stop-start lanes via Docker module
  ansible.builtin.import_tasks: ../../app_stopstart/tasks/run_container.yml
  when: module_cfg.deploy_mode == 'stop_start'

- name: Promote previous metadata back to current
  ansible.builtin.copy:
    src: "{{ release_dir }}/previous.json"
    dest: "{{ release_dir }}/current.json"
    remote_src: true
    mode: "0644"
