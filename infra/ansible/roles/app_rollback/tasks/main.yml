---
- name: Check that previous release metadata exists
  ansible.builtin.stat:
    path: "{{ release_dir }}/previous.json"
  register: app_rollback_previous_release_stat

- name: Abort when there is no previous release to roll back to
  ansible.builtin.assert:
    that:
      - app_rollback_previous_release_stat.stat.exists
    fail_msg: "Cannot rollback {{ module }} because {{ release_dir }}/previous.json does not exist."

- name: Read previous release metadata
  ansible.builtin.slurp:
    src: "{{ release_dir }}/previous.json"
  register: app_rollback_previous_release_raw

- name: Parse previous release metadata
  ansible.builtin.set_fact:
    app_rollback_previous_release: "{{ app_rollback_previous_release_raw.content | b64decode | from_json }}"

- name: Check whether current release metadata exists
  ansible.builtin.stat:
    path: "{{ release_dir }}/current.json"
  register: app_rollback_current_release_stat

- name: Assert deploy_mode is a supported rollback target
  ansible.builtin.assert:
    that:
      - module_cfg.deploy_mode in ['blue_green', 'stop_start']
    fail_msg: >-
      Unsupported deploy_mode '{{ module_cfg.deploy_mode }}' for module '{{ module }}'.
      Rollback aborted before any state change. Supported values: blue_green, stop_start

- name: Capture rollback archive timestamp
  ansible.builtin.set_fact:
    app_rollback_archive_timestamp: "{{ now(utc=true, fmt='%Y%m%dT%H%M%SZ') }}"
  when: app_rollback_current_release_stat.stat.exists

- name: Archive the current release metadata before rollback
  ansible.builtin.copy:
    src: "{{ release_dir }}/current.json"
    dest: "{{ release_dir }}/reverted-{{ app_rollback_archive_timestamp }}.json"
    remote_src: true
    mode: "0644"
  when: app_rollback_current_release_stat.stat.exists

- name: Roll back blue-green lane via Ansible tasks
  ansible.builtin.import_role:
    name: app_bluegreen
    tasks_from: run_switch.yml
  vars:
    app_bluegreen_image: "{{ app_rollback_previous_release.image }}"
  when: module_cfg.deploy_mode == 'blue_green'

- name: Roll back stop-start lanes via Docker module
  ansible.builtin.import_role:
    name: app_stopstart
    tasks_from: run_container.yml
  vars:
    app_stopstart_image: "{{ app_rollback_previous_release.image }}"
  when: module_cfg.deploy_mode == 'stop_start'
