---
- name: Build app container environment
  ansible.builtin.set_fact:
    app_container_env: >-
      {{
        {
          'SPRING_PROFILES_ACTIVE': app_container_runtime_module_cfg.spring_profile
        }
        | combine({
          (app_container_runtime_module_cfg.spring_profile | upper ~ '_ACTUATOR_PORT'): actuator_port | string,
          (app_container_runtime_module_cfg.spring_profile | upper ~ '_ACTUATOR_PATH'): actuator_path
        })
        | combine(
          {
            'BEAT_SCHEDULER_OWNER': app_container_runtime_module_cfg.scheduler_owner | default(false) | string
          }
          if app_container_runtime_include_scheduler_owner | default(false) | bool
          else {}
        )
      }}
