---
- name: Ensure nginx config helper is installed
  ansible.builtin.import_role:
    name: nginx_config_helper

- name: Resolve generated nginx fragment paths
  ansible.builtin.set_fact:
    nginx_backend_upstream_source_path: "{{ nginx_generated_source_dir }}/upstreams/backend.conf"
    nginx_admin_upstream_source_path: "{{ nginx_generated_source_dir }}/upstreams/admin_backend.conf"
    nginx_actuator_upstream_source_path: "{{ nginx_generated_source_dir }}/upstreams/actuator.conf"
    nginx_backend_upstream_target_path: "{{ nginx_generated_target_dir }}/upstreams/backend.conf"
    nginx_admin_upstream_target_path: "{{ nginx_generated_target_dir }}/upstreams/admin_backend.conf"
    nginx_actuator_upstream_target_path: "{{ nginx_generated_target_dir }}/upstreams/actuator.conf"
    nginx_legacy_upstream_source_path: "{{ nginx_generated_source_dir }}/upstreams/00-managed.conf"
    nginx_legacy_upstream_target_path: "{{ nginx_generated_target_dir }}/upstreams/00-managed.conf"
    nginx_route_source_path: "{{ nginx_generated_source_dir }}/routes/10-managed.conf"
    nginx_route_target_path: "{{ nginx_generated_target_dir }}/routes/10-managed.conf"

- name: Ensure nginx candidate directory exists
  ansible.builtin.file:
    path: "{{ deployment_dir }}/nginx"
    state: directory
    mode: "0755"

- name: Preview candidate nginx default.conf in check mode
  ansible.builtin.debug:
    msg: "Would render nginx candidate to {{ deployment_dir }}/nginx/default.conf"
  when: ansible_check_mode

- name: Ensure generated nginx directories exist (source)
  ansible.builtin.file:
    path: "{{ nginx_generated_source_dir }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - upstreams
    - routes

- name: Ensure generated nginx base directory exists (target)
  ansible.builtin.file:
    path: "{{ nginx_generated_target_dir }}"
    state: directory
    mode: "0755"

- name: Ensure generated nginx directories exist (target)
  ansible.builtin.file:
    path: "{{ nginx_generated_target_dir }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - upstreams
    - routes

- name: Ensure live nginx config exists before promotion
  ansible.builtin.stat:
    path: "{{ nginx_conf_target_path }}"
  register: nginx_base_config_nginx_conf_target_stat

- name: Check legacy upstream migration source
  ansible.builtin.stat:
    path: "{{ nginx_legacy_upstream_source_path }}"
  register: nginx_base_config_legacy_upstream_source_stat

- name: Check legacy upstream migration target
  ansible.builtin.stat:
    path: "{{ nginx_legacy_upstream_target_path }}"
  register: nginx_base_config_legacy_upstream_target_stat

- name: Check per-upstream source fragments before legacy target removal
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop:
    - { name: "backend", path: "{{ nginx_backend_upstream_source_path }}" }
    - { name: "admin", path: "{{ nginx_admin_upstream_source_path }}" }
    - { name: "actuator", path: "{{ nginx_actuator_upstream_source_path }}" }
  register: nginx_base_config_upstream_source_stats
  loop_control:
    label: "{{ item.name }} -> {{ item.path }}"

- name: Build missing per-upstream source list for legacy target guard
  ansible.builtin.set_fact:
    nginx_base_config_missing_upstream_sources: >-
      {{
        nginx_base_config_upstream_source_stats.results
        | rejectattr('stat.exists')
        | map(attribute='item.name')
        | list
      }}

- name: Abort when live nginx config path is missing
  ansible.builtin.fail:
    msg: "Live nginx config does not exist at {{ nginx_conf_target_path }}"
  when:
    - not ansible_check_mode
    - not nginx_base_config_nginx_conf_target_stat.stat.exists

- name: Abort unsafe legacy-target-only upstream migration
  ansible.builtin.fail:
    msg:
      - "Refusing to replace legacy target upstream config with placeholder fragments."
      - "legacy target exists={{ nginx_base_config_legacy_upstream_target_stat.stat.exists | default(false) }}"
      - "legacy source exists={{ nginx_base_config_legacy_upstream_source_stat.stat.exists | default(false) }}"
      - "missing source fragments={{ nginx_base_config_missing_upstream_sources | join(', ') }}"
      - "Restore {{ nginx_legacy_upstream_source_path }} or create all per-upstream source fragments before running nginx_base_config."
  when:
    - nginx_base_config_legacy_upstream_target_stat.stat.exists | default(false)
    - not (nginx_base_config_legacy_upstream_source_stat.stat.exists | default(false))
    - nginx_base_config_missing_upstream_sources | length > 0

- name: Report nginx promotion plan in check mode
  ansible.builtin.debug:
    msg:
      - "Would backup {{ deployment_dir }}/nginx/default.conf to {{ deployment_dir }}/nginx/default.conf.bak"
      - "Would backup {{ nginx_backend_upstream_source_path }} to {{ nginx_backend_upstream_source_path }}.bak"
      - "Would backup {{ nginx_admin_upstream_source_path }} to {{ nginx_admin_upstream_source_path }}.bak"
      - "Would backup {{ nginx_actuator_upstream_source_path }} to {{ nginx_actuator_upstream_source_path }}.bak"
      - "Would backup {{ nginx_legacy_upstream_source_path }} to {{ nginx_legacy_upstream_source_path }}.bak"
      - "Would backup {{ nginx_route_source_path }} to {{ nginx_route_source_path }}.bak"
      - "Would backup {{ nginx_backend_upstream_target_path }} to {{ nginx_backend_upstream_target_path }}.bak"
      - "Would backup {{ nginx_admin_upstream_target_path }} to {{ nginx_admin_upstream_target_path }}.bak"
      - "Would backup {{ nginx_actuator_upstream_target_path }} to {{ nginx_actuator_upstream_target_path }}.bak"
      - "Would backup {{ nginx_legacy_upstream_target_path }} to {{ nginx_legacy_upstream_target_path }}.bak"
      - "Would backup {{ nginx_route_target_path }} to {{ nginx_route_target_path }}.bak"
      - "Would backup {{ nginx_conf_target_path }} to {{ nginx_conf_target_path }}.bak"
      - "Would split legacy upstreams/00-managed.conf into per-upstream fragments when present"
      - "Would remove legacy upstreams/00-managed.conf before nginx validation"
      - "Would render {{ deployment_dir }}/nginx/default.conf and sync generated fragments to target"
      - "Would validate with docker exec {{ nginx_container_name }} nginx -t"
      - "Would reload nginx on validation success"
  when: ansible_check_mode

- name: Build nginx base config transaction plan
  ansible.builtin.set_fact:
    nginx_base_config_transaction_files:
      - id: candidate-config-source
        path: "{{ deployment_dir }}/nginx/default.conf"
        role: source-config
        backup: true
        required: false
      - id: backend-upstream-source
        path: "{{ nginx_backend_upstream_source_path }}"
        role: source
        backup: true
        required: false
      - id: admin-upstream-source
        path: "{{ nginx_admin_upstream_source_path }}"
        role: source
        backup: true
        required: false
      - id: actuator-upstream-source
        path: "{{ nginx_actuator_upstream_source_path }}"
        role: source
        backup: true
        required: false
      - id: legacy-upstream-source
        path: "{{ nginx_legacy_upstream_source_path }}"
        role: legacy
        backup: true
        required: false
      - id: route-source
        path: "{{ nginx_route_source_path }}"
        role: source
        backup: true
        required: false
      - id: backend-upstream-target
        path: "{{ nginx_backend_upstream_target_path }}"
        role: target
        backup: true
        required: false
      - id: admin-upstream-target
        path: "{{ nginx_admin_upstream_target_path }}"
        role: target
        backup: true
        required: false
      - id: actuator-upstream-target
        path: "{{ nginx_actuator_upstream_target_path }}"
        role: target
        backup: true
        required: false
      - id: legacy-upstream-target
        path: "{{ nginx_legacy_upstream_target_path }}"
        role: legacy
        backup: true
        required: false
      - id: route-target
        path: "{{ nginx_route_target_path }}"
        role: target
        backup: true
        required: false
      - id: live-config-target
        path: "{{ nginx_conf_target_path }}"
        role: live-config
        backup: true
        required: true
    nginx_base_config_transaction_operations:
      - id: render-candidate-nginx-config
        name: Render candidate nginx default.conf
        kind: template
        dest_file: candidate-config-source
        template:
          src: "{{ playbook_dir }}/../roles/nginx_base_config/templates/default.conf.j2"
          mode: "0644"
        affects_reload: false
      - id: split-legacy-upstream-source
        name: Split legacy upstream source into per-upstream fragments
        kind: command
        when_file_exists: legacy-upstream-source
        command:
          argv:
            - python3
            - "{{ deployment_dir }}/update-nginx-config.py"
            - split-upstreams
            - --source
            - "{{ nginx_legacy_upstream_source_path }}"
            - --output-dir
            - "{{ nginx_generated_source_dir }}/upstreams"
            - --mapping
            - "{{ backend_upstream_name | default('backend') }}=backend.conf"
            - --mapping
            - "{{ admin_upstream_name | default('admin_backend') }}=admin_backend.conf"
            - --mapping
            - "{{ actuator_upstream_name | default('actuator') }}=actuator.conf"
            - --require-all
            - --skip-existing
        changed_if:
          stdout_contains: changed=true
        affects_reload: false
      - id: remove-legacy-upstream-source
        name: Remove legacy upstream source after split migration
        kind: file_absent
        file: legacy-upstream-source
        when_file_preexisted: legacy-upstream-source
        affects_reload: false
      - id: seed-backend-upstream
        name: Seed backend upstream marker in source fragment
        kind: command
        when_file_missing: backend-upstream-source
        command:
          argv:
            - python3
            - "{{ deployment_dir }}/update-nginx-config.py"
            - upsert-upstream
            - --path
            - "{{ nginx_backend_upstream_source_path }}"
            - --upstream-name
            - "{{ backend_upstream_name | default('backend') }}"
            - --container-name
            - "127.0.0.1"
            - --backend-port
            - "65535"
        changed_if:
          stdout_contains: changed=true
        affects_reload: false
      - id: seed-admin-upstream
        name: Seed admin upstream marker in source fragment
        kind: command
        when_file_missing: admin-upstream-source
        command:
          argv:
            - python3
            - "{{ deployment_dir }}/update-nginx-config.py"
            - upsert-upstream
            - --path
            - "{{ nginx_admin_upstream_source_path }}"
            - --upstream-name
            - "{{ admin_upstream_name | default('admin_backend') }}"
            - --container-name
            - "127.0.0.1"
            - --backend-port
            - "65535"
        changed_if:
          stdout_contains: changed=true
        affects_reload: false
      - id: seed-actuator-upstream
        name: Seed actuator upstream marker in source fragment
        kind: command
        when_file_missing: actuator-upstream-source
        command:
          argv:
            - python3
            - "{{ deployment_dir }}/update-nginx-config.py"
            - upsert-upstream
            - --path
            - "{{ nginx_actuator_upstream_source_path }}"
            - --upstream-name
            - "{{ actuator_upstream_name | default('actuator') }}"
            - --container-name
            - "127.0.0.1"
            - --backend-port
            - "65535"
        changed_if:
          stdout_contains: changed=true
        affects_reload: false
      - id: seed-admin-route
        name: Seed admin route marker in source fragment
        kind: command
        when_file_missing: route-source
        command:
          argv:
            - python3
            - "{{ deployment_dir }}/update-nginx-config.py"
            - ensure-route
            - --path
            - "{{ nginx_route_source_path }}"
            - --upstream-name
            - "{{ admin_upstream_name | default('admin_backend') }}"
            - --external-path
            - "{{ modules.admin.nginx_route.external_path | default('/admin') }}"
            - --upstream-path
            - "{{ modules.admin.nginx_route.upstream_path | default('/api/admin') }}"
        changed_if:
          stdout_contains: changed=true
        affects_reload: false
      - id: sync-backend-upstream-target
        name: Sync backend upstream fragment to target
        kind: copy
        src_file: backend-upstream-source
        dest_file: backend-upstream-target
        mode: "0644"
        affects_reload: true
      - id: sync-admin-upstream-target
        name: Sync admin upstream fragment to target
        kind: copy
        src_file: admin-upstream-source
        dest_file: admin-upstream-target
        mode: "0644"
        affects_reload: true
      - id: sync-actuator-upstream-target
        name: Sync actuator upstream fragment to target
        kind: copy
        src_file: actuator-upstream-source
        dest_file: actuator-upstream-target
        mode: "0644"
        affects_reload: true
      - id: remove-legacy-upstream-target-before-validation
        name: Remove legacy upstream target before nginx validation
        kind: file_absent
        file: legacy-upstream-target
        when_file_preexisted: legacy-upstream-target
        affects_reload: true
      - id: sync-route-target
        name: Sync route fragment to target
        kind: copy
        src_file: route-source
        dest_file: route-target
        mode: "0644"
        affects_reload: true
      - id: promote-live-nginx-config
        name: Promote candidate nginx config to live target
        kind: copy
        src_file: candidate-config-source
        dest_file: live-config-target
        mode: "0644"
        affects_reload: true

- name: Promote and validate nginx config transactionally
  ansible.builtin.include_role:
    name: nginx_fragment_transaction
  vars:
    nginx_fragment_transaction_id: nginx-base-config
    nginx_fragment_transaction_files: "{{ nginx_base_config_transaction_files }}"
    nginx_fragment_transaction_operations: "{{ nginx_base_config_transaction_operations }}"
    nginx_fragment_transaction_validate_command:
      - docker
      - exec
      - "{{ nginx_container_name }}"
      - nginx
      - -t
    nginx_fragment_transaction_reload_command:
      - docker
      - exec
      - "{{ nginx_container_name }}"
      - nginx
      - -s
      - reload
    nginx_fragment_transaction_failure_summary: >-
      nginx config promotion failed and previous source/target config was restored
  when: not ansible_check_mode
