name: rollback-dev

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Module to rollback"
        type: choice
        options:
          - apis
          - admin
          - batch
        required: true
      release_ref:
        description: "Branch, tag, or full commit SHA whose rollback workflow code should run; target image comes from previous.json"
        type: string
        required: true

jobs:
  # release_ref selects the rollback workflow code checkout only; playbooks/rollback.yml restores the target image from previous.json.
  resolve-rollback-ref:
    outputs:
      checkout_ref: ${{ steps.git-ref.outputs.commit_sha }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Validate dev rollback release ref
        id: rollback-ref
        env:
          RELEASE_REF: ${{ github.event.inputs.release_ref }}
        shell: bash
        run: |
          if [[ -z "$RELEASE_REF" ]]; then
            echo "Invalid dev rollback release_ref: value is required" >&2
            exit 1
          fi

          if [[ "$RELEASE_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "checkout_ref_input=$RELEASE_REF" >> "$GITHUB_OUTPUT"
          elif [[ "$RELEASE_REF" != -* && "$RELEASE_REF" != refs/pull/* ]] && git check-ref-format --allow-onelevel "$RELEASE_REF"; then
            echo "checkout_ref_input=$RELEASE_REF" >> "$GITHUB_OUTPUT"
          else
            echo "Invalid dev rollback release_ref: $RELEASE_REF (expected branch, tag, or full 40-character commit SHA)" >&2
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.rollback-ref.outputs.checkout_ref_input }}
          fetch-depth: 0

      - name: Capture dev rollback code commit
        id: git-ref
        env:
          RELEASE_REF: ${{ github.event.inputs.release_ref }}
        shell: bash
        run: |
          commit_sha="$(git rev-parse HEAD)"
          if [[ "$RELEASE_REF" =~ ^[0-9a-fA-F]{40}$ && "${commit_sha,,}" != "${RELEASE_REF,,}" ]]; then
            echo "Dev rollback commit SHA mismatch: input=$RELEASE_REF checkout=$commit_sha" >&2
            exit 1
          fi

          echo "Dev rollback release_ref ${RELEASE_REF} resolved to commit ${commit_sha}"
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"

  rollback:
    needs:
      - resolve-rollback-ref
    concurrency:
      group: dev-runtime
      queue: max
      cancel-in-progress: false
    uses: ./.github/workflows/_ansible-exec.yml
    with:
      environment_name: dev
      module: ${{ github.event.inputs.module }}
      playbook: playbooks/rollback.yml
      inventory_path: inventories/dev/hosts.yml
      success_title: Rollback Dev Succeeded
      failure_title: Rollback Dev Failed
      notify_description: |
        Module: ${{ github.event.inputs.module }}
        Release Ref: ${{ github.event.inputs.release_ref }}
        Checkout Commit: ${{ needs.resolve-rollback-ref.outputs.checkout_ref }}
        Target Image: read from previous.json on the dev host
        Actor: ${{ github.actor }}
      checkout_ref: ${{ needs.resolve-rollback-ref.outputs.checkout_ref }}
    secrets:
      ssh_private_key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
      sops_age_key: ${{ secrets.AGE_SECRET_KEY }}
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
