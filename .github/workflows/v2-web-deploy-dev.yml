name: v2-web-deploy-dev

on:
  workflow_dispatch:
  push:
    branches:
      - develop

jobs:
  v2-web-deploy-dev:
    environment: dev
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    env:
      MODULE: apis
      PROFILE: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Gradle caching
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Verify v2-web baseline
        run: |
          chmod +x gradlew
          GRADLE_USER_HOME=/tmp/gradle-home ./gradlew verifyV2WebBaseline
        shell: bash

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DEV_DOCKER_LOGIN_USERNAME }}
          password: ${{ secrets.DEV_DOCKER_LOGIN_ACCESSTOKEN }}

      - name: Compute image name
        id: image
        run: |
          jar_path=$(find "${MODULE}/build/libs" -maxdepth 1 -name "${MODULE}-*.jar" ! -name '*-plain.jar' | head -n 1)
          if [ -z "$jar_path" ]; then
            echo "${MODULE} jar not found" >&2
            exit 1
          fi
          SHORT_SHA=${GITHUB_SHA::7}
          echo "jar_path=${jar_path}" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.DEV_DOCKER_LOGIN_USERNAME }}/beat-${MODULE}:dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${{ secrets.DEV_DOCKER_LOGIN_USERNAME }}/beat-${MODULE}:dev-latest" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build and push image
        run: |
          docker build -f Dockerfile.module \
            --build-arg MODULE=${MODULE} \
            --build-arg PROFILE=${PROFILE} \
            --build-arg JAR_PATH="${{ steps.image.outputs.jar_path }}" \
            --platform linux/amd64 \
            -t "${{ steps.image.outputs.image }}" \
            -t "${{ steps.image.outputs.latest }}" \
            .
          docker push "${{ steps.image.outputs.image }}"
          docker push "${{ steps.image.outputs.latest }}"
        shell: bash

      - name: Deploy to dev host
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEV_SECRET_PROPERTIES: ${{ secrets.APPLICATION_DEV_SECRET_SPRING }}
          DEV_V2_ACTUATOR_PORT: ${{ secrets.DEV_V2_ACTUATOR_PORT }}
          DEV_ACTUATOR_PATH: ${{ secrets.DEV_ACTUATOR_PATH }}
          EXTERNAL_PORT_BLUE: ${{ secrets.EXTERNAL_PORT_BLUE }}
          EXTERNAL_PORT_GREEN: ${{ secrets.EXTERNAL_PORT_GREEN }}
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USERNAME }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEV_SSH_PORT }}
          envs: DEV_SECRET_PROPERTIES,DEV_V2_ACTUATOR_PORT,DEV_ACTUATOR_PATH,EXTERNAL_PORT_BLUE,EXTERNAL_PORT_GREEN
          script: |
            mkdir -p /opt/beat/secret
            printf "%s" "$DEV_SECRET_PROPERTIES" > /opt/beat/secret/application-dev-secret.properties
            chmod 700 /opt/beat/secret || true
            chmod 600 /opt/beat/secret/application-dev-secret.properties
            docker pull "${{ steps.image.outputs.image }}"

            export OPERATION_ENV='dev'
            export INTERNAL_PORT='8080'
            export EXTERNAL_PORT_GREEN="${EXTERNAL_PORT_GREEN}"
            export EXTERNAL_PORT_BLUE="${EXTERNAL_PORT_BLUE}"
            export DOCKER_IMAGE_NAME="${{ steps.image.outputs.image }}"

            cd /home/ubuntu/deployment
            chmod +x deploy-dev.sh
            ./deploy-dev.sh

            for attempt in $(seq 1 30); do
              if curl --fail --silent "http://localhost:${DEV_V2_ACTUATOR_PORT}${DEV_ACTUATOR_PATH}/health" > /dev/null; then
                exit 0
              fi
              sleep 2
            done
            exit 1
