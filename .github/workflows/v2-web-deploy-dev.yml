name: v2-web-deploy-dev

on:
  workflow_dispatch:
  push:
    branches:
      - develop

jobs:
  v2-web-deploy-dev:
    environment: dev
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    env:
      MODULE: apis
      PROFILE: dev
      CONTAINER_NAME: beat-v2-web-dev
      REMOTE_APP_DIR: /opt/beat/beat-v2-web-dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Gradle caching
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Verify v2-web baseline
        run: |
          chmod +x gradlew
          GRADLE_USER_HOME=/tmp/gradle-home ./gradlew verifyV2WebBaseline
        shell: bash

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DEV_DOCKER_LOGIN_USERNAME }}
          password: ${{ secrets.DEV_DOCKER_LOGIN_ACCESSTOKEN }}

      - name: Compute image name
        id: image
        run: |
          jar_path=$(find apis/build/libs -maxdepth 1 -name 'apis-*.jar' ! -name '*-plain.jar' | head -n 1)
          if [ -z "$jar_path" ]; then
            echo "apis jar not found" >&2
            exit 1
          fi
          SHORT_SHA=${GITHUB_SHA::7}
          echo "jar_path=${jar_path}" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.DEV_DOCKER_LOGIN_USERNAME }}/beat-apis:dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${{ secrets.DEV_DOCKER_LOGIN_USERNAME }}/beat-apis:dev-latest" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build and push image
        run: |
          docker build -f Dockerfile.module \
            --build-arg MODULE=${MODULE} \
            --build-arg PROFILE=${PROFILE} \
            --build-arg JAR_PATH="${{ steps.image.outputs.jar_path }}" \
            --platform linux/amd64 \
            -t "${{ steps.image.outputs.image }}" \
            -t "${{ steps.image.outputs.latest }}" \
            .
          docker push "${{ steps.image.outputs.image }}"
          docker push "${{ steps.image.outputs.latest }}"
        shell: bash

      - name: Deploy to dev host
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEV_SECRET_PROPERTIES: ${{ secrets.APPLICATION_DEV_SECRET_SPRING }}
          DEV_V2_ACTUATOR_PORT: ${{ secrets.DEV_V2_ACTUATOR_PORT }}
          DEV_ACTUATOR_PATH: ${{ secrets.DEV_ACTUATOR_PATH }}
          DEV_V2_WEB_PUBLIC_PORT: ${{ secrets.DEV_V2_WEB_PUBLIC_PORT }}
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USERNAME }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEV_SSH_PORT }}
          envs: CONTAINER_NAME,REMOTE_APP_DIR,DEV_SECRET_PROPERTIES,DEV_V2_ACTUATOR_PORT,DEV_ACTUATOR_PATH,DEV_V2_WEB_PUBLIC_PORT
          script: |
            mkdir -p /opt/beat/secret
            printf "%s" "$DEV_SECRET_PROPERTIES" > /opt/beat/secret/application-dev-secret.properties
            chmod 700 /opt/beat/secret || true
            chmod 600 /opt/beat/secret/application-dev-secret.properties
            docker pull "${{ steps.image.outputs.latest }}"
            docker rm -f ${CONTAINER_NAME} || true
            docker run -d \
              --name ${CONTAINER_NAME} \
              --restart unless-stopped \
              --network beat-network \
              -v /opt/beat/secret:/app/secret:ro \
              -p ${DEV_V2_WEB_PUBLIC_PORT}:8080 \
              -p ${DEV_V2_ACTUATOR_PORT}:2222 \
              "${{ steps.image.outputs.latest }}"
            for attempt in $(seq 1 30); do
              if curl --fail --silent "http://localhost:${DEV_V2_ACTUATOR_PORT}${DEV_ACTUATOR_PATH}/health" > /dev/null; then
                exit 0
              fi
              sleep 2
            done
            docker logs --tail 100 ${CONTAINER_NAME} || true
            exit 1
