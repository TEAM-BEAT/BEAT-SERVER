name: v2-web-pr

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  v2-web-pr:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Gradle caching
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Verify v2-web baseline
        run: |
          chmod +x gradlew
          GRADLE_USER_HOME=/tmp/gradle-home ./gradlew verifyV2WebBaseline --parallel --build-cache
        shell: bash
