name: ansible-lint

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
    paths:
      - "infra/ansible/**"
      - ".github/workflows/deploy-dev.yml"
      - ".github/workflows/deploy-prod.yml"
      - ".github/workflows/rollback-prod.yml"
      - ".github/workflows/_ansible-exec.yml"
      - ".github/actions/setup-deploy-tooling/**"

jobs:
  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ansible-core==2.17.14" "ansible-lint"

      - name: Run ansible-lint
        run: |
          ansible-lint infra/ansible/playbooks/*.yml infra/ansible/roles
