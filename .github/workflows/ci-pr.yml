name: ci-pr

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Gradle caching
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-cleanup: on-success

      - name: Verify baseline
        run: |
          chmod +x gradlew
          ./gradlew verifyV2WebBaseline :admin:test :batch:test verifyModuleBootJars --parallel --build-cache
        shell: bash

  scan-images:
    needs: verify
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        module:
          - apis
          - admin
          - batch
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build scan image
        run: |
          docker build -f Dockerfile.module \
            --build-arg MODULE=${{ matrix.module }} \
            --platform linux/amd64 \
            -t beat-scan:${{ matrix.module }} .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: image
          image-ref: beat-scan:${{ matrix.module }}
          trivy-config: .trivy-image.yaml
