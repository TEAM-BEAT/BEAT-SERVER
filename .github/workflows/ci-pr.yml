name: ci-pr

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 25
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Gradle caching
        uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3 # v4.4.2
        with:
          gradle-home-cache-cleanup: true

      - name: Verify baseline
        run: |
          chmod +x gradlew
          ./gradlew verifyV2WebBaseline :admin:test :batch:test verifyModuleBootJars --parallel --build-cache
        shell: bash

  scan-images:
    needs: verify
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        module:
          - apis
          - admin
          - batch
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build scan image
        run: |
          docker build -f Dockerfile.module \
            --build-arg MODULE=${{ matrix.module }} \
            --platform linux/amd64 \
            -t beat-scan:${{ matrix.module }} .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          scan-type: image
          image-ref: beat-scan:${{ matrix.module }}
          trivy-config: .trivy-image.yaml
