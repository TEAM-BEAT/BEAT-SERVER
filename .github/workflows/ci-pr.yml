name: ci-pr

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Gradle caching
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-cleanup: on-success

      # Hard gate: the catalog has no intentional unused aliases today. If a temporary
      # exception is ever needed, document it with a reason in the allowlist path
      # printed by the checker and remove it when the migration closes.
      - name: Check unused version catalog aliases
        run: python3 .github/scripts/check_unused_version_catalog_aliases.py
        shell: bash

      - name: Verify Gradle check
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_RELEASE: beat-server@${{ github.sha }}
        run: |
          chmod +x gradlew
          ./gradlew check verifyModuleBootJars --parallel --build-cache
        shell: bash

      - name: Stage bootJars for downstream image build
        run: |
          mkdir -p staged-jars
          for module in apis admin batch; do
            JAR=$(find "${module}/build/libs" -maxdepth 1 -name "${module}-*.jar" ! -name '*-plain.jar' | head -n 1)
            [ -n "$JAR" ] || { echo "No bootJar produced for ${module}" >&2; exit 1; }
            cp "$JAR" "staged-jars/${module}.jar"
          done
          ls -lh staged-jars
        shell: bash

      - name: Upload bootJars artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bootjars
          path: staged-jars/
          if-no-files-found: error
          retention-days: 1

      # Advisory phase: buildHealth is intentionally non-blocking on first adoption.
      # Promote to a hard gate only after the report is triaged into:
      # - immediate fixes,
      # - intentional false positives / runtime-only cases with documented plugin config,
      # - follow-up cleanup issues.
      # Then remove continue-on-error and switch dependencyAnalysis severity from warn to fail.
      - name: Generate dependency health report
        continue-on-error: true
        run: |
          ./gradlew buildHealth --max-workers=2 -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=1g" --build-cache
        shell: bash

  scan-images:
    needs: verify
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        module:
          - apis
          - admin
          - batch
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download bootJars artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bootjars
          path: staged-jars

      - name: Prepare app.jar for Docker build context
        env:
          MODULE: ${{ matrix.module }}
        run: |
          [ -f "staged-jars/${MODULE}.jar" ] || { echo "Missing staged-jars/${MODULE}.jar" >&2; exit 1; }
          cp "staged-jars/${MODULE}.jar" app.jar
          ls -lh app.jar
        shell: bash

      - name: Build scan image
        run: |
          docker build -f Dockerfile.module \
            --build-arg MODULE=${{ matrix.module }} \
            -t beat-scan:${{ matrix.module }} .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: image
          image-ref: beat-scan:${{ matrix.module }}
          trivy-config: .trivy-image.yaml
