name: deploy-prod

on:
  release:
    types:
      - published

jobs:
  resolve-release:
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      module_matrix: ${{ steps.release.outputs.module_matrix }}
      commit_sha: ${{ steps.git-ref.outputs.commit_sha }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Validate release tag
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          if [[ -z "$RELEASE_TAG" ]] || [[ ! "$RELEASE_TAG" =~ ^[0-9A-Za-z._-]+$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo 'module_matrix={"include":[{"module":"apis"},{"module":"admin"},{"module":"batch"}]}' >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ steps.release.outputs.release_tag }}

      - name: Capture released commit
        id: git-ref
        shell: bash
        run: |
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  verify:
    needs:
      - resolve-release
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve-release.outputs.commit_sha }}

      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: "25"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3 # v4.4.2
        with:
          gradle-home-cache-cleanup: true

      - name: Verify baseline
        run: |
          chmod +x gradlew
          ./gradlew \
            verifyV2WebBaseline \
            :admin:test :batch:test \
            verifyModuleBootJars \
            --parallel --build-cache
        shell: bash

  build-image:
    needs:
      - resolve-release
      - verify
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
    environment: prod
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.resolve-release.outputs.module_matrix) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve-release.outputs.commit_sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          username: ${{ secrets.PROD_DOCKER_LOGIN_USERNAME }}
          password: ${{ secrets.PROD_DOCKER_LOGIN_ACCESSTOKEN }}

      - name: Compute image name
        id: image
        env:
          DOCKER_NAMESPACE: ${{ secrets.PROD_DOCKER_LOGIN_USERNAME }}
          MODULE: ${{ matrix.module }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          IMAGE_TAG="${RELEASE_TAG}"
          IMAGE_REF="${DOCKER_NAMESPACE}/beat-${MODULE}:${IMAGE_TAG}"
          IMAGE_LATEST="${DOCKER_NAMESPACE}/beat-${MODULE}:prod-latest"
          echo "tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "latest=$IMAGE_LATEST" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        env:
          MODULE: ${{ matrix.module }}
        run: |
          docker build -f Dockerfile.module \
            --build-arg MODULE=${MODULE} \
            --platform linux/amd64 \
            -t "${{ steps.image.outputs.image }}" \
            -t "${{ steps.image.outputs.latest }}" \
            .
          docker push "${{ steps.image.outputs.image }}"
          docker push "${{ steps.image.outputs.latest }}"

  deploy:
    needs:
      - resolve-release
      - verify
      - build-image
    concurrency:
      group: prod-runtime
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.resolve-release.outputs.module_matrix) }}
    uses: ./.github/workflows/_ansible-exec.yml
    with:
      environment_name: prod
      module: ${{ matrix.module }}
      playbook: playbooks/deploy.yml
      inventory_path: inventories/prod/hosts.yml
      success_title: Deploy Prod Succeeded
      failure_title: Deploy Prod Failed
      notify_description: |
        Module: ${{ matrix.module }}
        Release Tag: ${{ needs.resolve-release.outputs.release_tag }}
        Actor: ${{ github.actor }}
      image: ${{ secrets.PROD_DOCKER_LOGIN_USERNAME }}/beat-${{ matrix.module }}:${{ needs.resolve-release.outputs.release_tag }}
      image_tag: ${{ needs.resolve-release.outputs.release_tag }}
      commit_sha: ${{ needs.resolve-release.outputs.commit_sha }}
      deploy_actor: ${{ github.actor }}
      checkout_ref: ${{ needs.resolve-release.outputs.commit_sha }}
    secrets:
      ssh_private_key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
      sops_age_key: ${{ secrets.AGE_SECRET_KEY }}
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
