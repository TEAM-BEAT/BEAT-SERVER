name: dev-CI

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize
      - reopened
jobs:
  dev-ci:
    environment: dev

    # Operating system - ubuntu-22.04
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      # Checkout - 가상 머신에 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # JDK setting - compile with JDK 25, target JVM 21 via Gradle config
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      # gradle caching - 빌드 시간 향상
      - name: Gradle Caching
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Prepare dev secret file
        run: |
          mkdir -p secret
          printf "%s" "${{ secrets.APPLICATION_DEV_SECRET_SPRING }}" > secret/application-dev-secret.properties
          chmod 600 secret/application-dev-secret.properties
        shell: bash

      # gradle build - legacy v1 baseline only
      - name: Verify legacy v1 baseline
        run: |
          chmod +x gradlew
          GRADLE_USER_HOME=/tmp/gradle-home ./gradlew verifyLegacyV1Baseline
        shell: bash

      # Set up Docker Buildx - Docker Buildx 설치
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.9.1

      # Log in to Docker Hub - Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DEV_DOCKER_LOGIN_USERNAME }}
          password: ${{ secrets.DEV_DOCKER_LOGIN_ACCESSTOKEN }}

      # Build and push Docker image - Docker image 빌드 및 푸시
      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile-dev --platform linux/amd64 -t hoonyworld/beat-dev .
          docker push hoonyworld/beat-dev

