name: ansible-secret-aware-verify

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "infra/ansible/**"
      - ".github/workflows/ansible-lint.yml"
      - ".github/workflows/ansible-secret-aware-verify.yml"
      - ".github/actions/resolve-ansible-connection/**"
      - ".github/scripts/resolve_ansible_connection.py"
      - ".github/actions/setup-ansible-tooling/**"
      - ".github/actions/setup-ssh-client/**"
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "infra/ansible/**"
      - ".github/workflows/ansible-lint.yml"
      - ".github/workflows/ansible-secret-aware-verify.yml"
      - ".github/actions/resolve-ansible-connection/**"
      - ".github/scripts/resolve_ansible_connection.py"
      - ".github/actions/setup-ansible-tooling/**"
      - ".github/actions/setup-ssh-client/**"
  workflow_dispatch:

jobs:
  verify-dev:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/develop' || github.base_ref == 'develop'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        module:
          - apis
          - admin
          - batch
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Ansible tooling
        uses: ./.github/actions/setup-ansible-tooling

      - name: Resolve dev SSH connection metadata
        id: resolve
        uses: ./.github/actions/resolve-ansible-connection
        with:
          inventory_path: inventories/dev/hosts.yml
          module: ${{ matrix.module }}
          SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Verify dev encrypted inventory, resolver, and lint
        working-directory: infra/ansible
        env:
          MODULE: ${{ matrix.module }}
          SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}
          SSH_HOST: ${{ steps.resolve.outputs.ssh_host }}
          SSH_PORT: ${{ steps.resolve.outputs.ssh_port }}
          SSH_HOST_FINGERPRINT: ${{ steps.resolve.outputs.ssh_host_fingerprint }}
        run: |
          ansible-inventory -i inventories/dev/hosts.yml --list >/dev/null
          echo "Verified resolver for module=${MODULE}"
          [[ -n "$SSH_HOST" ]]
          [[ -n "$SSH_PORT" ]]
          [[ -n "$SSH_HOST_FINGERPRINT" ]]
          ansible-lint playbooks/*.yml roles

  verify-prod:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.base_ref == 'main'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: prod
    strategy:
      fail-fast: false
      matrix:
        module:
          - apis
          - admin
          - batch
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Ansible tooling
        uses: ./.github/actions/setup-ansible-tooling

      - name: Resolve prod SSH connection metadata
        id: resolve
        uses: ./.github/actions/resolve-ansible-connection
        with:
          inventory_path: inventories/prod/hosts.yml
          module: ${{ matrix.module }}
          SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Verify prod encrypted inventory, resolver, and lint
        working-directory: infra/ansible
        env:
          MODULE: ${{ matrix.module }}
          SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}
          SSH_HOST: ${{ steps.resolve.outputs.ssh_host }}
          SSH_PORT: ${{ steps.resolve.outputs.ssh_port }}
          SSH_HOST_FINGERPRINT: ${{ steps.resolve.outputs.ssh_host_fingerprint }}
        run: |
          ansible-inventory -i inventories/prod/hosts.yml --list >/dev/null
          echo "Verified resolver for module=${MODULE}"
          [[ -n "$SSH_HOST" ]]
          [[ -n "$SSH_PORT" ]]
          [[ -n "$SSH_HOST_FINGERPRINT" ]]
          ansible-lint playbooks/*.yml roles
