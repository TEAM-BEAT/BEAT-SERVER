name: rollback-prod

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Module to rollback"
        type: choice
        options:
          - apis
          - admin
          - batch
        required: true
      release_ref:
        description: "Release tag or commit SHA whose Ansible code should run rollback"
        type: string
        required: true

jobs:
  resolve-rollback-ref:
    outputs:
      checkout_ref: ${{ steps.git-ref.outputs.commit_sha }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Validate rollback release ref
        id: rollback-ref
        env:
          RELEASE_REF: ${{ github.event.inputs.release_ref }}
        shell: bash
        run: |
          if [[ -z "$RELEASE_REF" ]] || [[ ! "$RELEASE_REF" =~ ^[0-9A-Za-z._/-]+$ ]]; then
            echo "Invalid rollback release ref: $RELEASE_REF" >&2
            exit 1
          fi
          if [[ "$RELEASE_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "checkout_ref_input=$RELEASE_REF" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_ref_input=refs/tags/$RELEASE_REF" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.rollback-ref.outputs.checkout_ref_input }}
          fetch-depth: 0

      - name: Capture rollback code commit
        id: git-ref
        env:
          RELEASE_REF: ${{ github.event.inputs.release_ref }}
        shell: bash
        run: |
          commit_sha="$(git rev-parse HEAD)"
          if [[ "$RELEASE_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
            if [[ "${commit_sha,,}" != "${RELEASE_REF,,}" ]]; then
              echo "Rollback commit SHA mismatch: input=$RELEASE_REF checkout=$commit_sha" >&2
              exit 1
            fi
          elif ! git rev-parse --verify --quiet "refs/tags/${RELEASE_REF}^{commit}" >/tmp/rollback_ref_commit; then
            echo "Rollback release_ref must be an existing release tag or a full 40-character commit SHA: $RELEASE_REF" >&2
            exit 1
          elif [[ "$(cat /tmp/rollback_ref_commit)" != "$commit_sha" ]]; then
            echo "Rollback release tag mismatch: input=$RELEASE_REF checkout=$commit_sha" >&2
            exit 1
          fi
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"

  rollback:
    needs:
      - resolve-rollback-ref
    concurrency:
      group: prod-runtime
      cancel-in-progress: false
    uses: ./.github/workflows/_ansible-exec.yml
    with:
      environment_name: prod
      module: ${{ github.event.inputs.module }}
      playbook: playbooks/rollback.yml
      inventory_path: inventories/prod/hosts.yml
      success_title: Rollback Prod Succeeded
      failure_title: Rollback Prod Failed
      notify_description: |
        Module: ${{ github.event.inputs.module }}
        Release Ref: ${{ github.event.inputs.release_ref }}
        Checkout Commit: ${{ needs.resolve-rollback-ref.outputs.checkout_ref }}
        Actor: ${{ github.actor }}
      checkout_ref: ${{ needs.resolve-rollback-ref.outputs.checkout_ref }}
    secrets:
      ssh_private_key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
      sops_age_key: ${{ secrets.AGE_SECRET_KEY }}
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
