name: Setup Deploy Tooling
description: Compatibility wrapper that installs deployment tooling and delegates SSH bootstrap to setup-ssh-client

inputs:
  ssh-host:
    description: SSH host for known_hosts bootstrap
    required: true
  ssh-port:
    description: SSH port for known_hosts bootstrap
    required: false
    default: "22"
  ssh-private-key:
    description: Private key used for deployment
    required: true
  ssh-host-fingerprint:
    description: Expected host key fingerprint (SHA256:...)
    required: true

runs:
  using: composite
  steps:
    - name: Setup Ansible tooling
      uses: ./.github/actions/setup-ansible-tooling

    - name: Setup SSH client
      uses: ./.github/actions/setup-ssh-client
      with:
        ssh-host: ${{ inputs.ssh-host }}
        ssh-port: ${{ inputs.ssh-port }}
        ssh-private-key: ${{ inputs.ssh-private-key }}
        ssh-host-fingerprint: ${{ inputs.ssh-host-fingerprint }}
