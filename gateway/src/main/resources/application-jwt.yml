---
jwt:
  secret: ${DEV_JWT_SECRET}
  legacy-secret: ${DEV_JWT_LEGACY_SECRET}
  access-token-expire-time: ${DEV_ACCESS_TOKEN_EXPIRE_TIME}
  refresh-token-expire-time: ${DEV_REFRESH_TOKEN_EXPIRE_TIME}
  key-id: dev-2026-05-current
  legacy-access-token-verify-until: 1970-01-01T00:00:00Z

spring:
  config:
    activate:
      on-profile: dev

