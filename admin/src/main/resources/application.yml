server:
  port: 4000

spring:
  application:
    name: beat-admin
  profiles:
    group:
      dev:
        - persistence
        - redis
        - external
        - jwt
        - observability
        - thread-pool
      prod:
        - persistence
        - redis
        - external
        - jwt
        - observability
        - thread-pool
      test:
        - persistence
        - redis
        - external
        - jwt
        - observability
        - thread-pool

beat:
  scheduler:
    owner: false

springdoc:
  use-fqn: false
  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    urls-primary-name: admin
  # Nginx가 /api/admin/ 만 admin 서버로 프록시하므로(다른 경로는 apis로 흐름), api-docs 도
  # /api/admin 하위로 노출해야 통합 Swagger(apis)에서 도달 가능하다.
  # 그룹("admin")이 base path 뒤에 붙어 최종 문서 경로는 /api/admin/v3/api-docs/admin 이 된다.
  api-docs:
    path: /api/admin/v3/api-docs

---
spring:
  config:
    activate:
      on-profile: dev
    import: optional:file:secret/application-dev-secret.properties

cors:
  allowed-origins: ${DEV_ALLOWED_ORIGINS}

app:
  server:
    url: ${DEV_SERVER_URL}

---
spring:
  config:
    activate:
      on-profile: prod
    import: optional:file:secret/application-prod-secret.properties

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

cors:
  allowed-origins: ${PROD_ALLOWED_ORIGINS}

app:
  server:
    url: ${PROD_SERVER_URL}
